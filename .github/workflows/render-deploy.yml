name: Deploy Render API

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render deploy hook
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Post Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set — skipping deploy hook."
            echo "Add the hook URL from Render Dashboard → Service → Settings → Deploy Hook."
            exit 0
          fi

          echo "Triggering Render deploy..."
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Deploy hook accepted."
