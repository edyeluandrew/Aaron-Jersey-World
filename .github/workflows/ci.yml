name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (Prisma + syntax)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        working-directory: server
        run: npx prisma validate

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Check server entry syntax
        run: npm run ci --workspace=server

  client:
    name: Client (Vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client workspace
        run: npm ci --workspace=aaron-jersey-world-client --include-workspace-root

      - name: Build frontend
        run: npm run build --workspace=aaron-jersey-world-client
        env:
          VITE_API_BASE_URL: https://aaron-jersey-world.onrender.com/api/v1
